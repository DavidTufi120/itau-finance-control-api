common: &default_settings
  license_key: <%= ENV["NEW_RELIC_API_KEY"] %>
  app_name: finance-control-api
  distributed_tracing:
    enabled: true
  log_level: info
  log_file_count: 1
  log_limit_in_kbytes: 0
  log_file_name: newrelic_agent.log
  log_file_path: logs
  high_security: false
  browser_monitoring:
    auto_instrument: false
  transaction_tracer:
    enabled: true
    transaction_threshold: apdex_f
    record_sql: obfuscated
  error_collector:
    enabled: true
    ignore_status_codes: 404

production:
  <<: *default_settings

