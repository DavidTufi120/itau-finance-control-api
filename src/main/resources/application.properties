spring.application.name=finance-control-api
server.port=8080

api.security.api-key=${API_KEY:aXRhw7o=}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/finance_control?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Sao_Paulo}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

